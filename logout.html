<!DOCTYPE html>
<html>
<head>
  <title>Logout</title>
</head>
<body style="background:#0d0d0d;color:white;font-family:Arial;text-align:center;">

<h2>Logging out...</h2>

<script type="module">
  import { auth } from "./firebase.js";
  import { signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  signOut(auth).then(()=>{
    window.location.href="login.html";
  });
</script>

</body>
</html>
